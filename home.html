<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questions Answer — Ask anything</title>
<meta name="description" content="Ask anything and get a genuinely helpful answer, instantly.">
<style>
  :root{
    --bg:#ffffff; --fg:#0d0d0d; --muted:#6e6e80; --line:#ececf1;
    --user:#f4f4f4; --accent:#0b57d0; --accent2:#10a37f; --chip:#f7f7f8; --chiphover:#ececec;
    --radius:24px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--fg);
    font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,"Apple Color Emoji",sans-serif;
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100dvh}
  a{color:inherit}
  header{height:56px;flex:none;display:flex;align-items:center;justify-content:space-between;
    padding:0 18px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(8px);position:sticky;top:0;z-index:10}
  .brand{display:flex;align-items:center;gap:9px;font-weight:600;font-size:15.5px;letter-spacing:-.01em}
  .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#10a37f,#0b57d0);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px}
  .demolink{font-size:13px;color:var(--muted);text-decoration:none;border:1px solid var(--line);padding:6px 12px;border-radius:18px;transition:.15s}
  .demolink:hover{background:var(--chip);color:var(--fg)}
  main{flex:1;overflow-y:auto;scroll-behavior:smooth}
  .col{max-width:768px;margin:0 auto;padding:0 20px}
  .empty{min-height:calc(100dvh - 220px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px}
  .empty .logo-lg{width:52px;height:52px;border-radius:14px;font-size:26px;margin-bottom:10px;background:linear-gradient(135deg,#10a37f,#0b57d0);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
  .empty h1{font-size:28px;font-weight:600;letter-spacing:-.02em;margin:2px 0}
  .empty p{color:var(--muted);font-size:15px;margin:0 0 22px}
  .examples{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:600px}
  .ex{border:1px solid var(--line);border-radius:14px;padding:13px 15px;text-align:left;cursor:pointer;background:#fff;transition:.15s;font-size:13.5px;line-height:1.4}
  .ex:hover{background:var(--chip);border-color:#dcdce4}
  .ex b{display:block;font-weight:600;margin-bottom:2px}
  .ex span{color:var(--muted)}
  .thread{padding:26px 0 10px}
  .msg{margin:0 0 26px;display:flex;gap:13px;align-items:flex-start}
  .msg.user{justify-content:flex-end}
  .msg.user .body{background:var(--user);padding:11px 16px;border-radius:20px;max-width:80%;font-size:15px;line-height:1.55}
  .av{width:28px;height:28px;border-radius:7px;flex:none;background:linear-gradient(135deg,#10a37f,#0b57d0);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12.5px;margin-top:1px}
  .msg.bot .body{font-size:15.5px;line-height:1.7;padding-top:3px;max-width:calc(100% - 42px)}
  .msg.bot .body p{margin:0 0 12px}
  .msg.bot .body p:last-child{margin-bottom:0}
  .err{color:#b3261e}
  .typing{display:inline-flex;gap:5px;padding:6px 0}
  .typing i{width:8px;height:8px;border-radius:50%;background:#c4c4cf;animation:bb 1.1s infinite}
  .typing i:nth-child(2){animation-delay:.18s}.typing i:nth-child(3){animation-delay:.36s}
  @keyframes bb{0%,70%,100%{transform:translateY(0);opacity:.45}35%{transform:translateY(-5px);opacity:1}}
  .kw{color:var(--accent);font-weight:500;cursor:pointer;border-bottom:1.5px solid #bcd3f5;padding-bottom:.5px}
  .kw:hover{border-bottom-color:var(--accent)}
  .kw:after{content:"↗";font-size:10px;vertical-align:super;opacity:.6;margin-left:1px}
  .ad{border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin:4px 0 14px;max-width:520px;background:#fcfcfd;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .ad .lbl{font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--accent2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .ad .lbl:before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent2)}
  .ad .top{display:flex;align-items:center;gap:9px;margin-bottom:7px}
  .ad .fav{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#10a37f,#0b57d0);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex:none}
  .ad .adv{font-size:13.5px;font-weight:600}
  .ad .disp{font-size:12px;color:var(--muted)}
  .ad h4{margin:2px 0 3px;font-size:15.5px;color:var(--accent);font-weight:500;cursor:pointer}
  .ad h4:hover{text-decoration:underline}
  .ad .desc{font-size:13.5px;color:#3c3c47;line-height:1.5}
  .ad .cta{display:inline-block;margin-top:10px;background:var(--accent2);color:#fff;font-size:13px;font-weight:600;padding:8px 16px;border-radius:9px;cursor:pointer}
  .sugs{display:flex;flex-direction:column;gap:1px;margin:2px 0 8px;border-top:1px solid var(--line)}
  .sug{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 2px;border-bottom:1px solid var(--line);cursor:pointer;font-size:14.5px;color:#1a1a22}
  .sug:hover{color:var(--accent)}
  .sug .plus{color:var(--muted);font-size:18px;font-weight:300}
  .composer-wrap{flex:none;padding:10px 0 16px;background:linear-gradient(transparent,var(--bg) 32%)}
  .composer{max-width:768px;margin:0 auto;padding:0 20px}
  .inputbar{display:flex;align-items:flex-end;gap:8px;border:1px solid #d9d9e3;border-radius:26px;padding:8px 8px 8px 18px;box-shadow:0 2px 10px rgba(0,0,0,.06);background:#fff;transition:.15s}
  .inputbar:focus-within{border-color:#b6b6c6;box-shadow:0 2px 16px rgba(0,0,0,.1)}
  textarea#input{flex:1;border:none;outline:none;resize:none;font:inherit;font-size:15.5px;line-height:1.5;max-height:160px;padding:6px 0;background:transparent;color:var(--fg)}
  .send{flex:none;width:38px;height:38px;border-radius:50%;border:none;background:var(--fg);color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
  .send:disabled{background:#d4d4dc;cursor:default}
  .foot{text-align:center;color:#9a9aa6;font-size:11.5px;margin-top:9px}
  .foot a{color:#9a9aa6}
  @media(max-width:560px){.examples{grid-template-columns:1fr}.empty h1{font-size:23px}}
</style>
</head>
<body>
  <header>
    <div class="brand"><div class="logo">Q</div>Questions Answer</div>
    <a class="demolink" href="/demo">Ad demo ↗</a>
  </header>

  <main id="main">
    <div class="col">
      <div class="empty" id="empty">
        <div class="logo-lg">Q</div>
        <h1>What do you want to know?</h1>
        <p>Ask anything — get a clear, genuinely helpful answer.</p>
        <div class="examples" id="examples"></div>
      </div>
      <div class="thread" id="thread"></div>
    </div>
  </main>

  <div class="composer-wrap">
    <div class="composer">
      <div class="inputbar">
        <textarea id="input" rows="1" placeholder="Ask anything…" autocomplete="off"></textarea>
        <button class="send" id="send" disabled aria-label="Send">↑</button>
      </div>
      <div class="foot">Questions Answer can make mistakes. Answers may include <a href="/demo">sponsored results</a>.</div>
    </div>
  </div>

<script>
const $=id=>document.getElementById(id);
const main=$('main'), thread=$('thread'), empty=$('empty'), input=$('input'), send=$('send');
let history=[], busy=false, locale='en-US', adStore={}, msgN=0;
const EXAMPLES=[
  ["How much does a new roof cost in 2026?","Get real price ranges and what drives them"],
  ["Term vs whole life insurance — which is better?","Understand the trade-offs simply"],
  ["How can I lower my car insurance?","Practical ways to cut your premium"],
  ["Is home solar worth it right now?","Savings, incentives and payback time"]
];

const norm=s=>String(s).toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function api(body){ return fetch('/api/ask',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json().then(d=>({ok:r.ok,d}))); }

function renderAnswer(raw){
  const parts=esc(raw).split(/\n{2,}/).map(p=>p.trim()).filter(Boolean);
  const html=(parts.length?parts:[esc(raw)]).map(p=>'<p>'+p.replace(/\n/g,'<br>')+'</p>').join('');
  return html.replace(/\[\[(.+?)\|(.+?)\]\]/g,(m,id,t)=>`<span class="kw" data-ad="${esc(id)}">${t}</span>`);
}

(async()=>{
  $('examples').innerHTML=EXAMPLES.map(e=>`<div class="ex"><b>${e[0]}</b><span>${e[1]}</span></div>`).join('');
  $('examples').querySelectorAll('.ex').forEach((el,i)=>el.addEventListener('click',()=>ask(EXAMPLES[i][0])));
  try{ const {d}=await api({action:'regions'}); if(d&&d.detected&&d.detected.locale) locale=d.detected.locale; }catch(e){}
})();

function autosize(){ input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,160)+'px'; }
input.addEventListener('input',()=>{ autosize(); send.disabled=!input.value.trim()||busy; });
input.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); ask(input.value); } });
send.addEventListener('click',()=>ask(input.value));

function ask(text){
  text=(text||'').trim(); if(!text||busy) return;
  if(empty.style.display!=='none'){ empty.style.display='none'; }
  pushUser(text); input.value=''; autosize(); send.disabled=true;
  askBackend(text);
}
async function askBackend(question){
  busy=true;
  const bubble=addTyping();
  try{
    const {ok,d}=await api({action:'chat',question,history,locale});
    if(!ok) throw new Error(d&&d.error||'Something went wrong');
    renderReply(bubble,d);
    history.push({role:'user',content:question}); history.push({role:'assistant',content:d.answer});
    if(history.length>12) history=history.slice(-12);
  }catch(e){ bubble.querySelector('.body').className='body err'; bubble.querySelector('.body').textContent='⚠ '+e.message; }
  busy=false; send.disabled=!input.value.trim(); input.focus();
}

function pushUser(text){
  const m=document.createElement('div'); m.className='msg user';
  m.innerHTML=`<div class="body">${esc(text)}</div>`;
  thread.appendChild(m); scrollDown();
}
function addTyping(){
  const m=document.createElement('div'); m.className='msg bot';
  m.innerHTML=`<div class="av">Q</div><div class="body"><span class="typing"><i></i><i></i><i></i></span></div>`;
  thread.appendChild(m); scrollDown(); return m;
}
function scrollDown(){ main.scrollTop=main.scrollHeight; }

function renderReply(bubble,data){
  msgN++; const p='m'+msgN+'_'; const ids=[];
  Object.keys(data.ads||{}).forEach(k=>{ const id=p+norm(k); adStore[id]=data.ads[k]; ids.push(id); });
  const body=bubble.querySelector('.body'); body.className='body';
  const markup=(data.answer||'').replace(/\[\[(.+?)\|(.+?)\]\]/g,(m,id,t)=>`[[${p}${norm(id)}|${t}]]`);
  body.innerHTML=renderAnswer(markup);
  body.querySelectorAll('.kw').forEach(k=>k.addEventListener('click',()=>showAd(body,k.dataset.ad,k.textContent.replace(/↗$/,''),ids)));
  if((data.suggest||[]).length) renderSuggest(body,data.suggest);
  scrollDown();
}
function renderSuggest(body,list){
  const wrap=document.createElement('div'); wrap.className='sugs';
  wrap.innerHTML=list.slice(0,5).map(q=>`<div class="sug"><span>${esc(q)}</span><span class="plus">+</span></div>`).join('');
  body.appendChild(wrap);
  wrap.querySelectorAll('.sug').forEach((el,i)=>el.addEventListener('click',()=>ask(list[i])));
}
function adHttps(ad){ let u=String((ad&&(ad.url||ad.disp))||'').trim(); if(!u) return ''; if(!/^https?:\/\//i.test(u)) u='https://'+u.replace(/^\/+/,''); try{ return new URL(u).origin; }catch(e){ return u; } }
function showAd(body,adId,query,ids){
  let ad=adStore[adId]; if(!ad && ids&&ids.length) ad=adStore[ids[0]]; if(!ad) return;
  const card=document.createElement('div'); card.className='ad';
  const open=()=>{ const u=adHttps(ad); if(u) window.open(u,'_blank','noopener,noreferrer'); };
  card.innerHTML=`<div class="lbl">Sponsored</div>
    <div class="top"><div class="fav">${esc((ad.adv||'?')[0])}</div><div><div class="adv">${esc(ad.adv||'')}</div><div class="disp">${esc(ad.disp||'')}</div></div></div>
    <h4 data-go>${esc(ad.head||'')}</h4><div class="desc">${esc(ad.desc||'')}</div>
    <span class="cta" data-go>${esc(ad.cta||'Learn more')}</span>`;
  body.appendChild(card);
  card.querySelectorAll('[data-go]').forEach(b=>b.addEventListener('click',open));
  scrollDown();
}
</script>
</body>
</html>
